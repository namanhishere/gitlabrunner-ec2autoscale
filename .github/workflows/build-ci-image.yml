name: Build & publish CI image

# Builds the CI job image and pushes it to GitHub Container Registry (GHCR).
# The published image is what gets baked into the worker AMI and used to run
# GitLab CI jobs.

on:
  push:
    branches: [main]
    paths:
      - "ci-image/**"
      - ".github/workflows/build-ci-image.yml"
    tags:
      - "v*"
  workflow_dispatch: {}
  # Weekly rebuild so :latest keeps picking up base-image security updates.
  schedule:
    - cron: "0 4 * * 1"

env:
  # Resulting image: ghcr.io/<owner>/<repo>-ci
  IMAGE_NAME: ghcr.io/${{ github.repository }}-ci

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=tag
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./ci-image
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
